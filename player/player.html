<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Share</title>
  <style>
    /* ─── Design tokens ───────────────────────────────────────────────────────
       Dark navy palette matching Pexip webapp3 aesthetics.
    ── */
    :root {
      --bg:          #0e0e1c;
      --surface:     #161628;
      --surface2:    #1e1e34;
      --border:      rgba(255,255,255,0.08);
      --primary:     #2d7ff9;
      --primary-h:   #1d6fe8;
      --danger:      #e84040;
      --danger-h:    #cc3333;
      --text:        #dde2f0;
      --text-sub:    #8090b0;
      --ctrl-h:      32px;      /* standard control height */
      --radius:      8px;
      --radius-sm:   6px;
      --gap:         8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── Share form ──────────────────────────────────────────────────────── */
    #share-form {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 22px 20px;
      overflow-y: auto;
    }

    #share-form h2 {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.01em;
    }

    /* Source cards — Local vs YouTube */
    .source-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .source-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px 12px;
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    .source-card:hover     { border-color: rgba(255,255,255,0.2); }
    .source-card.active    { border-color: var(--primary); background: rgba(45,127,249,0.08); }
    .source-card .card-icon { font-size: 28px; line-height: 1; }
    .source-card .card-label { font-size: 13px; font-weight: 600; color: var(--text); }
    .source-card .card-sub   { font-size: 11px; color: var(--text-sub); }

    /* YouTube icon */
    .yt-icon { color: #ff0000; }

    /* YouTube URL input */
    #youtube-panel { display: none; flex-direction: column; gap: 10px; }
    #youtube-url-input {
      width: 100%; padding: 10px 12px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text); font-size: 13px;
    }
    #youtube-url-input:focus { outline: none; border-color: var(--primary); }
    #youtube-url-input::placeholder { color: var(--text-sub); }

    /* Drop zone */
    #file-drop {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      color: var(--text-sub);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      transition: border-color 0.15s, background 0.15s;
    }
    #file-drop:hover, #file-drop.drag-over {
      border-color: var(--primary);
      background: rgba(45,127,249,0.06);
      color: #aabfe8;
    }
    #file-drop input {
      position: absolute; width: 0; height: 0;
      opacity: 0; overflow: hidden; pointer-events: none;
    }
    #file-drop .drop-icon { font-size: 30px; }
    #file-drop small { font-size: 11px; color: #444; }
    #file-label { font-size: 12px; color: var(--primary); word-break: break-all; min-height: 16px; }

    /* Progress bar */
    #progress-wrap {
      height: 3px; border-radius: 2px;
      background: var(--surface2); overflow: hidden; display: none;
    }
    #progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.15s; }

    /* Status message */
    .status-msg { font-size: 12px; color: var(--text-sub); min-height: 16px; line-height: 1.5; }
    .status-msg.error { color: #f07070; }

    /* ─── Unified button styles ───────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      height: var(--ctrl-h);
      padding: 0 14px;
      border-radius: var(--radius-sm);
      border: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s, opacity 0.12s;
      flex-shrink: 0;
    }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-primary  { background: var(--primary); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--primary-h); }

    .btn-danger   { background: var(--danger); color: #fff; }
    .btn-danger:hover:not(:disabled)  { background: var(--danger-h); }

    /* Icon/ghost control button — play/pause, mute, fullscreen */
    .ctrl-btn {
      display: inline-flex; align-items: center; justify-content: center;
      height: var(--ctrl-h); min-width: var(--ctrl-h);
      padding: 0 8px;
      background: transparent;
      border: none;
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 16px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.12s;
    }
    .ctrl-btn:hover { background: var(--surface2); }

    /* Secondary pill button — sync, speed */
    .pill-btn {
      display: inline-flex; align-items: center; justify-content: center;
      height: var(--ctrl-h);
      padding: 0 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-sub);
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.12s, color 0.12s;
    }
    .pill-btn:hover { background: var(--surface); color: var(--text); }

    /* Speed selector */
    .speed-select {
      height: var(--ctrl-h);
      padding: 0 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .speed-select:focus { outline: none; border-color: var(--primary); }

    /* Viewer-count badge */
    #viewer-presence {
      display: inline-flex; align-items: center;
      height: var(--ctrl-h);
      padding: 0 8px;
      font-size: 12px;
      color: var(--text-sub);
      flex-shrink: 0;
    }

    /* Volume */
    .vol-wrap {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .vol-slider {
      width: 72px;
      height: var(--ctrl-h);
      cursor: pointer;
      accent-color: var(--primary);
    }

    /* ─── Player view ─────────────────────────────────────────────────────── */
    #player-view {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    #video-wrap {
      flex: 1;
      position: relative;
      background: #000;
      overflow: hidden;
    }
    #video-wrap video {
      width: 100%; height: 100%;
      display: block; object-fit: contain;
    }

    /* Autoplay overlay */
    #play-overlay {
      position: absolute; inset: 0; display: none;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.45); cursor: pointer; z-index: 3;
    }
    #play-overlay .play-icon {
      font-size: 56px; color: #fff;
      filter: drop-shadow(0 2px 10px rgba(0,0,0,0.7));
    }

    /* Unmute prompt */
    #unmute-bar {
      display: none; position: absolute; bottom: 20px;
      left: 50%; transform: translateX(-50%);
      background: var(--primary); color: #fff;
      padding: 10px 22px; border-radius: 24px;
      font-size: 14px; font-weight: 600;
      cursor: pointer; z-index: 4; white-space: nowrap;
      box-shadow: 0 4px 16px rgba(45,127,249,0.4);
      animation: pulse-bar 2s ease-in-out infinite;
    }
    @keyframes pulse-bar {
      0%, 100% { transform: translateX(-50%) scale(1); }
      50%       { transform: translateX(-50%) scale(1.04); }
    }
    #unmute-bar:hover { background: var(--primary-h); }

    /* Peer badge */
    #peer-badge {
      position: absolute; top: 10px; left: 10px; z-index: 4;
      display: none; align-items: center; gap: 6px;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(4px);
      border-radius: 20px; padding: 4px 10px;
      font-size: 11px; color: #a0b8e0;
    }
    #peer-badge .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--primary); flex-shrink: 0;
    }

    /* ─── Sharer controls bar ─────────────────────────────────────────────── */
    #controls {
      display: none;
      align-items: center;
      gap: var(--gap);
      padding: 8px 12px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      min-height: 52px;
    }

    #seek-bar {
      flex: 1;
      height: var(--ctrl-h);
      cursor: pointer;
      accent-color: var(--primary);
      min-width: 0;
    }

    #time-display {
      font-size: 11px;
      color: var(--text-sub);
      white-space: nowrap;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    /* ─── Viewer bar ──────────────────────────────────────────────────────── */
    #viewer-bar {
      display: none;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px 12px;
      padding: 8px 14px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-sub);
      flex-shrink: 0;
      min-height: 48px;
    }
    #viewer-bar strong { color: var(--text); }

    /* ─── Fullscreen ──────────────────────────────────────────────────────── */
    :fullscreen body,      :-webkit-full-screen body      { background: #000; }
    :fullscreen #player-view, :-webkit-full-screen #player-view { flex: 1; }

    /* ─── Narrow layout (JS adds 'narrow' class when width < 540px) ───────────
       Row 1: ▶  [══════════════════════]  0:00/0:00
       Row 2: 1×▾  [⛶]  👁N  [■ Stop──]
       Row 3 (mobile): 🔊 [volume──────────────────]
    ── */
    body.narrow #controls {
      flex-wrap: wrap;
      row-gap: 6px;
      padding: 8px 10px;
      min-height: 0;
    }

    /* Row 1 */
    body.narrow #play-pause-btn { order: 1; }
    body.narrow #seek-bar       { order: 1; flex: 1 1 120px; }
    body.narrow #time-display   { order: 1; font-size: 10px; }

    /* Row 2 — action buttons, all same height */
    body.narrow .speed-select    { order: 2; flex: 1; max-width: 80px; }
    body.narrow #fullscreen-btn  { order: 2; }
    body.narrow #viewer-presence { order: 2; }
    body.narrow #stop-btn        { order: 2; flex: 1; }

    /* Row 3 — volume (own row so slider has full width) */
    body.narrow .vol-wrap        { order: 3; flex: 0 0 100%; justify-content: center; gap: 10px; }
    body.narrow .vol-slider      { flex: 1; max-width: 220px; height: 28px; }

    /* Bigger tap targets on mobile */
    body.narrow #resize-btn     { display: none; } /* widget already full-screen on mobile */
    body.narrow #fullscreen-btn,
    body.narrow #viewer-fs-btn { font-size: 20px; min-width: 44px; height: 40px; }

    /* Viewer bar on narrow: wrap volume to its own row */
    body.narrow #viewer-bar      { row-gap: 8px; }
    body.narrow #viewer-bar .vol-wrap { flex: 0 0 100%; justify-content: center; gap: 10px; }
    body.narrow #viewer-bar .vol-slider { flex: 1; max-width: 220px; height: 28px; }

    /* ─── Annotation canvas ──────────────────────────────────────────────── */
    #draw-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      z-index: 5;
      pointer-events: none;
      touch-action: none;
    }
    #draw-canvas.active { pointer-events: auto; cursor: crosshair; }

    /* Color swatches */
    .color-swatches {
      display: none;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .color-swatches.visible { display: flex; }
    .color-swatch {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      flex-shrink: 0;
      padding: 0;
      transition: border-color 0.1s, transform 0.1s;
    }
    .color-swatch:hover  { transform: scale(1.2); }
    .color-swatch.active { border-color: rgba(255,255,255,0.85); }

    .ctrl-btn.draw-active, .pill-btn.draw-active {
      color: var(--primary);
      background: rgba(45,127,249,0.18);
    }

    /* Narrow — draw row goes full-width below other controls */
    body.narrow #draw-btn       { order: 2; }
    body.narrow #clear-draw-btn { order: 2; }
    body.narrow #color-swatches { order: 4; flex: 0 0 100%; justify-content: center; }
  </style>
</head>
<body>

  <!-- ── Share form (sharer only) ── -->
  <div id="share-form">
    <h2>Share Media</h2>

    <!-- Source selector -->
    <div class="source-cards">
      <div class="source-card active" id="card-local">
        <span class="card-icon">📁</span>
        <span class="card-label">Local Video</span>
        <span class="card-sub">Upload MP4, MOV, WebM</span>
      </div>
      <div class="source-card" id="card-youtube">
        <span class="card-icon yt-icon">
          <!-- YouTube icon SVG -->
          <svg width="32" height="22" viewBox="0 0 32 22" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="32" height="22" rx="5" fill="#FF0000"/>
            <polygon points="13,6 13,16 22,11" fill="white"/>
          </svg>
        </span>
        <span class="card-label">YouTube</span>
        <span class="card-sub">Paste a YouTube URL</span>
      </div>
    </div>

    <!-- Local panel -->
    <div id="local-panel">
      <label id="file-drop">
        <input type="file" id="file-input" accept="video/*,.mp4,.mov,.webm,.avi,.mkv" />
        <div class="drop-icon">🎬</div>
        <div>Click or drag a video file here</div>
        <small>MP4 · MOV · WebM · AVI — up to 2 GB</small>
        <span id="file-label"></span>
      </label>
      <div id="progress-wrap"><div id="progress-fill"></div></div>
      <button class="btn btn-primary" id="share-btn" disabled>Upload &amp; Share</button>
    </div>

    <!-- YouTube panel -->
    <div id="youtube-panel">
      <input type="url" id="youtube-url-input"
        placeholder="https://www.youtube.com/watch?v=..."
        autocomplete="off" />
      <button class="btn btn-primary" id="share-youtube-btn">▶ Share YouTube Video</button>
    </div>

    <div class="status-msg" id="status-msg"></div>
  </div>

  <!-- ── Player view (sharer + viewer) ── -->
  <div id="player-view">
    <div id="video-wrap">
      <!-- player-inner: contains either <video> (local) or YouTube <iframe> -->
      <div id="player-inner" style="width:100%;height:100%;position:relative;">
        <video id="video" playsinline preload="auto" style="width:100%;height:100%;display:block;object-fit:contain;"></video>
      </div>

      <div id="play-overlay">
        <div class="play-icon">▶</div>
      </div>

      <div id="unmute-bar">🔇 Tap to unmute</div>

      <div id="peer-badge">
        <div class="dot"></div>
        <span id="peer-name">viewer</span> is watching
      </div>

      <!-- Annotation canvas — floats above video, activated by draw mode -->
      <canvas id="draw-canvas"></canvas>
    </div>

    <!-- Sharer controls -->
    <div id="controls">
      <button class="ctrl-btn" id="play-pause-btn" title="Play / Pause">▶</button>
      <input type="range" id="seek-bar" min="0" max="1000" value="0" step="1" />
      <span id="time-display">0:00 / 0:00</span>
      <select id="speed-select" class="speed-select" title="Playback speed">
        <option value="0.5">0.5×</option>
        <option value="0.75">0.75×</option>
        <option value="1" selected>1×</option>
        <option value="1.25">1.25×</option>
        <option value="1.5">1.5×</option>
        <option value="2">2×</option>
      </select>
      <div class="vol-wrap">
        <button class="ctrl-btn" id="mute-btn" title="Mute / Unmute">🔊</button>
        <input type="range" class="vol-slider" id="volume-bar" min="0" max="100" step="1" value="100" title="Volume" />
      </div>
      <button class="ctrl-btn" id="resize-btn"    title="Resize window" style="font-size:14px;">⤢</button>
      <button class="ctrl-btn" id="fullscreen-btn" title="Toggle fullscreen">⛶</button>
      <span id="viewer-presence" title="Participants watching">
        👁 <span id="viewer-count">0</span>
      </span>
      <!-- hidden pill buttons kept for JS refs -->
      <button class="pill-btn" id="push-sync-btn" style="display:none">⇾</button>
      <!-- Draw controls -->
      <button class="ctrl-btn" id="draw-btn" title="Toggle draw mode">🖊</button>
      <div class="color-swatches" id="color-swatches">
        <button class="color-swatch active" data-color="#ff4444" style="background:#ff4444" title="Red"></button>
        <button class="color-swatch" data-color="#ffee00" style="background:#ffee00" title="Yellow"></button>
        <button class="color-swatch" data-color="#ffffff" style="background:#ffffff" title="White"></button>
        <button class="color-swatch" data-color="#44bbff" style="background:#44bbff" title="Blue"></button>
      </div>
      <button class="ctrl-btn" id="clear-draw-btn" title="Clear all drawings" style="display:none">🗑</button>
      <button class="btn btn-danger" id="stop-btn">■ Stop</button>
    </div>

    <!-- Viewer bar -->
    <div id="viewer-bar">
      <span>Controlled by <strong id="sharer-label"></strong></span>
      <button class="pill-btn" id="pull-sync-btn" title="Snap to sharer's current position">⇽ Sync</button>
      <div class="vol-wrap">
        <button class="ctrl-btn" id="viewer-mute-btn" title="Mute / Unmute">🔊</button>
        <input type="range" class="vol-slider" id="viewer-volume-bar" min="0" max="100" step="1" value="100" title="Volume" />
      </div>
      <button class="ctrl-btn" id="viewer-fs-btn" title="Toggle fullscreen">⛶</button>
      <!-- Viewer draw controls -->
      <button class="pill-btn" id="viewer-draw-btn" title="Toggle draw mode">🖊 Draw</button>
      <div class="color-swatches" id="viewer-color-swatches">
        <button class="color-swatch active" data-color="#ff4444" style="background:#ff4444" title="Red"></button>
        <button class="color-swatch" data-color="#ffee00" style="background:#ffee00" title="Yellow"></button>
        <button class="color-swatch" data-color="#ffffff" style="background:#ffffff" title="White"></button>
        <button class="color-swatch" data-color="#44bbff" style="background:#44bbff" title="Blue"></button>
      </div>
      <button class="pill-btn" id="viewer-clear-draw-btn" title="Clear all drawings" style="display:none">🗑 Clear</button>
    </div>
  </div>

  <!-- YouTube IFrame API — loaded on demand by player.ts -->
  <script type="module" src="./player.ts"></script>
</body>
</html>
