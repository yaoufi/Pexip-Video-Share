<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Video Share</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #141420;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── Share form (sharer only, initial state) ─────────────────────────── */
    #share-form {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 24px;
      overflow-y: auto;
    }
    #share-form h2 { font-size: 15px; font-weight: 600; color: #fff; }

    #file-drop {
      border: 2px dashed #3a3a55;
      border-radius: 10px;
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      color: #888;
      font-size: 13px;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    #file-drop:hover, #file-drop.drag-over {
      border-color: #4eaaff;
      background: rgba(78,170,255,0.06);
      color: #b0c8e8;
    }
    #file-drop input { display: none; }
    #file-drop .drop-icon { font-size: 28px; }
    #file-label { font-size: 12px; color: #4eaaff; word-break: break-all; min-height: 16px; }

    #progress-wrap {
      height: 4px; border-radius: 2px; background: #2a2a40; overflow: hidden; display: none;
    }
    #progress-fill { height: 100%; background: #4eaaff; width: 0%; transition: width 0.15s; }

    .status-msg { font-size: 12px; color: #888; min-height: 16px; line-height: 1.5; }
    .status-msg.error { color: #f07070; }

    /* ─── Buttons ─────────────────────────────────────────────────────────── */
    .btn {
      padding: 10px 18px; border-radius: 8px; border: none;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-primary { background: #4eaaff; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #3a9af5; }
    .btn-danger  { background: #e04444; color: #fff; }
    .btn-danger:hover:not(:disabled)  { background: #c83a3a; }
    .btn-ghost {
      background: transparent; border: 1px solid #3a3a55; color: #b0b8d0;
    }
    .btn-ghost:hover { background: #1e1e30; }

    /* ─── Player view ─────────────────────────────────────────────────────── */
    #player-view {
      flex: 1; display: none; flex-direction: column; overflow: hidden;
    }

    /* Video area */
    #video-wrap {
      flex: 1; position: relative; background: #000; overflow: hidden;
    }
    #video-wrap video {
      width: 100%; height: 100%; display: block; object-fit: contain;
    }

    /* Autoplay-blocked overlay */
    #play-overlay {
      position: absolute; inset: 0; display: none;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.4); cursor: pointer; z-index: 3;
    }
    #play-overlay .play-icon {
      font-size: 56px; color: #fff;
      filter: drop-shadow(0 2px 10px rgba(0,0,0,0.7));
    }

    /* Viewer peer badge — shown when the other side is watching */
    #peer-badge {
      position: absolute; top: 10px; left: 10px; z-index: 4;
      background: rgba(0,0,0,0.55); border-radius: 20px;
      padding: 4px 10px; font-size: 11px; color: #b0d8ff;
      display: none; align-items: center; gap: 6px;
    }
    #peer-badge .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #4eaaff; flex-shrink: 0;
    }

    /* ─── Sharer controls (M&M DocViewer style) ───────────────────────────── */
    #controls {
      display: none; align-items: center; gap: 10px;
      padding: 8px 12px; background: #0e0e1a;
      border-top: 1px solid #1e1e30; flex-shrink: 0;
    }
    .ctrl-btn {
      background: transparent; border: none; color: #c8d0e0;
      font-size: 18px; cursor: pointer; padding: 4px 8px;
      border-radius: 4px; line-height: 1; flex-shrink: 0;
    }
    .ctrl-btn:hover { background: #222238; }
    #seek-bar {
      flex: 1; cursor: pointer; accent-color: #4eaaff; min-width: 0;
    }
    #time-display {
      font-size: 11px; color: #7080a0; white-space: nowrap; flex-shrink: 0;
    }

    /* M&M-style explicit sync buttons */
    .sync-btn {
      background: #1a1a30; border: 1px solid #3a3a55; color: #8090c0;
      border-radius: 6px; padding: 4px 10px; font-size: 11px;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
    }
    .sync-btn:hover { background: #222240; color: #b0c0e0; }

    /* ─── Viewer bar ──────────────────────────────────────────────────────── */
    #viewer-bar {
      display: none; padding: 7px 14px; background: #0e0e1a;
      font-size: 12px; color: #6070a0; border-top: 1px solid #1e1e30;
      align-items: center; justify-content: center;
      gap: 10px; flex-shrink: 0;
    }
    #viewer-bar strong { color: #8090c0; }

    /* Fullscreen */
    .fs-btn {
      background: transparent; border: 1px solid #3a3a55; color: #8090c0;
      border-radius: 5px; padding: 3px 8px; font-size: 14px;
      cursor: pointer; line-height: 1; flex-shrink: 0;
    }
    .fs-btn:hover { background: #1e1e30; color: #c0d0e8; }
    :fullscreen #player-view, :-webkit-full-screen #player-view { flex: 1; }
    :fullscreen body, :-webkit-full-screen body { background: #000; }
  </style>
</head>
<body>

  <!-- ── Share form (sharer only) ── -->
  <div id="share-form">
    <h2>Share a Video</h2>

    <label id="file-drop">
      <input type="file" id="file-input" accept="video/*,.mp4,.mov,.webm,.avi,.mkv" />
      <div class="drop-icon">🎬</div>
      <div>Click or drag a video file here</div>
      <small style="color:#555;">MP4 · MOV · WebM · AVI — up to 500 MB</small>
      <span id="file-label"></span>
    </label>

    <div id="progress-wrap"><div id="progress-fill"></div></div>

    <button class="btn btn-primary" id="share-btn" disabled>Upload &amp; Share</button>
    <div class="status-msg" id="status-msg"></div>
  </div>

  <!-- ── Player view (sharer + viewer) ── -->
  <div id="player-view">
    <div id="video-wrap">
      <video id="video" playsinline></video>

      <!-- Autoplay-blocked overlay -->
      <div id="play-overlay">
        <div class="play-icon">▶</div>
      </div>

      <!-- Peer presence badge -->
      <div id="peer-badge"><div class="dot"></div><span id="peer-name">viewer</span> is watching</div>
    </div>

    <!-- Sharer controls (M&M DocViewer style: ▶ seek ⇾ ⇽ ■) -->
    <div id="controls">
      <button class="ctrl-btn" id="play-pause-btn" title="Play / Pause (synced)">▶</button>
      <input type="range" id="seek-bar" min="0" max="1000" value="0" step="1" />
      <span id="time-display">0:00 / 0:00</span>
      <!-- M&M-style explicit sync buttons -->
      <button class="sync-btn" id="push-sync-btn" title="Push your position to viewers">⇾ Sync</button>
      <button class="sync-btn" id="pull-sync-btn" title="Pull current state from viewers">⇽ Pull</button>
      <button class="fs-btn"  id="fullscreen-btn" title="Toggle fullscreen">⛶</button>
      <button class="btn btn-danger" id="stop-btn">■ Stop</button>
    </div>

    <!-- Viewer bar -->
    <div id="viewer-bar">
      <span>Controlled by <strong id="sharer-label"></strong></span>
      <button class="fs-btn" id="viewer-fs-btn" title="Toggle fullscreen">⛶</button>
    </div>
  </div>

  <script type="module" src="./player.ts"></script>
</body>
</html>
